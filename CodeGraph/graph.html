<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CodeGraph 流程图</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Microsoft YaHei',sans-serif}
body{background:#0d1117;color:#c9d1d9;font-size:13px;display:flex}

/* 左侧面板 */
#sidebar{
  width:340px;min-width:340px;height:100vh;background:#161b22;
  border-right:1px solid #30363d;display:flex;flex-direction:column;
  overflow:hidden;z-index:10;
}
#sidebar-header{
  padding:16px 20px;border-bottom:1px solid #30363d;
  background:rgba(22,27,34,0.98);
}
#sidebar-header h1{font-size:18px;color:#e6edf3;margin-bottom:4px}
#sidebar-header .sub{font-size:11px;color:#8b949e}
#search-box{
  margin:12px 16px;position:relative;
}
#search-box input{
  width:100%;background:#0d1117;color:#c9d1d9;
  border:1px solid #30363d;border-radius:8px;
  padding:10px 14px;font-size:13px;outline:none;
}
#search-box input:focus{border-color:#58a6ff}
#search-results{
  flex:1;overflow-y:auto;padding:4px 16px;
}
.sr-item{
  padding:10px 12px;cursor:pointer;border-radius:6px;
  margin-bottom:2px;transition:background .12s;
  border:1px solid transparent;
}
.sr-item:hover{background:#1c2128;border-color:#30363d}
.sr-item.active{background:#1f2835;border-color:#58a6ff}
.sr-name{font-weight:600;color:#e6edf3;font-size:13px}
.sr-info{font-size:11px;color:#8b949e;margin-top:2px}
.sr-kind{
  display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;
  border-radius:4px;margin-right:6px;text-transform:uppercase;letter-spacing:.3px;
}
.sr-kind.File{background:#30363d;color:#58a6ff}
.sr-kind.Class{background:#3d2608;color:#f0883e}
.sr-kind.Function{background:#0d3d1e;color:#3fb950}
.sr-kind.Interface{background:#2a1a3d;color:#d2a8ff}
#stats{
  padding:12px 20px;border-top:1px solid #30363d;
  font-size:11px;color:#8b949e;line-height:1.8;
}
#stats span{color:#e6edf3;font-weight:600}
#no-select{display:flex;align-items:center;justify-content:center;height:100%;color:#484f58;font-size:14px;padding:40px}

/* 主画布 */
#main{flex:1;position:relative;overflow:hidden}
#main svg{width:100%;height:100%}
#tooltip{
  position:absolute;pointer-events:none;
  background:rgba(22,27,34,0.97);color:#c9d1d9;
  border:1px solid #30363d;border-radius:8px;
  padding:12px 16px;font-size:12px;max-width:400px;
  line-height:1.7;opacity:0;transition:opacity .15s;
  z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.6);
}
#tooltip.on{opacity:1}
#topbar{
  position:absolute;top:16px;right:16px;display:flex;gap:8px;z-index:5;
}
#topbar button{
  background:rgba(22,27,34,0.95);color:#c9d1d9;
  border:1px solid #30363d;border-radius:8px;
  padding:8px 14px;font-size:12px;cursor:pointer;
  backdrop-filter:blur(12px);transition:all .15s;
}
#topbar button:hover{background:#30363d;border-color:#8b949e}
#loading{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#8b949e;font-size:18px;text-align:center;
}
#loading .spinner{width:32px;height:32px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 流程图节点 */
.node-rect{cursor:pointer;transition:filter .15s}
.node-rect:hover{filter:brightness(1.2)}
.edge-path{fill:none;stroke-linecap:round}
marker{overflow:visible}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>🔗 CodeGraph</h1>
    <div class="sub">代码调用关系流程图 · Bilingual Flowchart</div>
  </div>
  <div id="search-box">
    <input id="search-input" type="text" placeholder="搜索类名 / 函数名..." autocomplete="off" spellcheck="false">
  </div>
  <div id="search-results">
    <div id="no-select">请搜索并选择一个函数或类<br>查看其调用关系流程图</div>
  </div>
  <div id="stats">
    <div>📦 节点: <span id="stat-nodes">-</span> / 边: <span id="stat-edges">-</span></div>
    <div>📂 文件: <span id="stat-files">-</span> / 数据库: <span id="stat-size">-</span></div>
  </div>
</div>

<div id="main">
  <svg></svg>
  <div id="topbar">
    <button id="btn-fit">适应画面</button>
    <button id="btn-zoom-in">放大 +</button>
    <button id="btn-zoom-out">缩小 −</button>
    <button id="btn-reset">重置</button>
  </div>
  <div id="loading"><div class="spinner"></div>正在加载数据库...</div>
  <div id="tooltip"></div>
</div>

<script>
"use strict";

// ───────── 全局状态 ─────────
let db = null;
let currentFlow = { nodes: [], edges: [] };
let svg, gRoot, gNodes, gEdges;
let W, H;
let currentTransform = d3.zoomIdentity;

const KIND_COLOR = {
  File:"#58a6ff", Class:"#f0883e", Function:"#3fb950",
  Method:"#3fb950", Interface:"#d2a8ff", Struct:"#e6b800",
  Enum:"#a371f7", Property:"#79c0ff", Variable:"#8b949e",
  Namespace:"#56d364", Field:"#79c0ff"
};

const KIND_LABEL_ZH = {
  File:"文件", Class:"类", Function:"函数", Method:"方法",
  Interface:"接口", Struct:"结构体", Enum:"枚举",
  Property:"属性", Variable:"变量", Namespace:"命名空间",
  Field:"字段"
};

const EDGE_LABEL_ZH = {
  CALLS:"调用", CONTAINS:"包含", IMPORTS_FROM:"导入",
  INHERITS:"继承", DEPENDS_ON:"依赖"
};

// ───────── 初始化 ─────────
async function init() {
  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
  });

  const resp = await fetch("graph.db");
  const buf = await resp.arrayBuffer();
  db = new SQL.Database(new Uint8Array(buf));

  // 统计
  const nc = db.exec("SELECT COUNT(*) FROM nodes")[0].values[0][0];
  const ec = db.exec("SELECT COUNT(*) FROM edges")[0].values[0][0];
  const fc = db.exec("SELECT COUNT(DISTINCT file_path) FROM nodes WHERE kind!='File'")[0].values[0][0];

  // 数据库大小
  const sizeResp = await fetch("graph.db");
  const sizeMb = (sizeResp.headers.get("content-length") / 1048576 || 0).toFixed(1);

  document.getElementById("stat-nodes").textContent = nc;
  document.getElementById("stat-edges").textContent = ec;
  document.getElementById("stat-files").textContent = (fc || "—");
  document.getElementById("stat-size").textContent = sizeMb + " MB";

  document.getElementById("loading").style.display = "none";
  setupSVG();
  setupSearch();
}

// ───────── SVG ─────────
function setupSVG() {
  W = document.getElementById("main").clientWidth;
  H = document.getElementById("main").clientHeight;

  svg = d3.select("#main svg").attr("viewBox", [0, 0, W, H]);
  gRoot = svg.append("g");
  gEdges = gRoot.append("g").attr("class", "edges");
  gNodes = gRoot.append("g").attr("class", "nodes");

  // 箭头 marker
  const defs = svg.append("defs");
  defs.append("marker")
    .attr("id","arrow-calls").attr("viewBox","0 -5 10 10")
    .attr("refX",32).attr("refY",0).attr("markerWidth",7).attr("markerHeight",7)
    .attr("orient","auto")
    .append("path").attr("d","M0,-4L10,0L0,4Z").attr("fill","#3fb950");
  defs.append("marker")
    .attr("id","arrow-inherits").attr("viewBox","0 -5 10 10")
    .attr("refX",32).attr("refY",0).attr("markerWidth",7).attr("markerHeight",7)
    .attr("orient","auto")
    .append("path").attr("d","M0,-4L10,0L0,4Z").attr("fill","#d2a8ff");
  defs.append("marker")
    .attr("id","arrow-imports").attr("viewBox","0 -5 10 10")
    .attr("refX",32).attr("refY",0).attr("markerWidth",7).attr("markerHeight",7)
    .attr("orient","auto")
    .append("path").attr("d","M0,-4L10,0L0,4Z").attr("fill","#f0883e");

  const zoom = d3.zoom()
    .scaleExtent([0.1, 5])
    .on("zoom", ev => { currentTransform = ev.transform; gRoot.attr("transform", ev.transform); });
  svg.call(zoom);

  document.getElementById("btn-fit").onclick = fitGraph;
  document.getElementById("btn-zoom-in").onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.3);
  document.getElementById("btn-zoom-out").onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
  document.getElementById("btn-reset").onclick = () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);

  // tooltip
  const tip = document.getElementById("tooltip");
  gNodes.on("mousemove", ev => { tip.style.left = (ev.pageX + 14) + "px"; tip.style.top = (ev.pageY + 14) + "px"; });
}

// ───────── 搜索 ─────────
function setupSearch() {
  const input = document.getElementById("search-input");
  const results = document.getElementById("search-results");
  let timer;

  input.addEventListener("input", () => {
    clearTimeout(timer);
    timer = setTimeout(() => doSearch(input.value.trim()), 200);
  });

  function doSearch(q) {
    if (q.length < 1) {
      results.innerHTML = '<div id="no-select">请搜索并选择一个函数或类<br>查看其调用关系流程图</div>';
      return;
    }
    try {
      const rows = db.exec(
        `SELECT qualified_name, name, kind, file_path 
         FROM nodes WHERE kind IN ('Function','Method','Class','Interface') 
         AND name LIKE ? LIMIT 40`,
        [`%${q}%`]
      );
      if (!rows.length) {
        results.innerHTML = '<div style="padding:20px;color:#8b949e;text-align:center">未找到匹配项</div>';
        return;
      }
      const nodes = rows[0].values;
      results.innerHTML = nodes.map((r, i) => {
        const [qn, name, kind, fp] = r;
        const shortFile = fp ? fp.replace(/^.*[\\/]/, "").slice(0, 50) : "";
        const prefix = fp ? fp.split(/[\\/]/).slice(-3, -1).join("/") + "/" : "";
        return `<div class="sr-item" data-qn="${esc(qn)}" data-idx="${i}">
          <div><span class="sr-kind ${kind}">${kind}</span><span class="sr-name">${esc(name)}</span></div>
          <div class="sr-info">${esc(prefix)}${esc(shortFile)}</div>
        </div>`;
      }).join("");
    } catch(e) {
      results.innerHTML = '<div style="padding:20px;color:#f85149">查询出错: ' + esc(e.message) + '</div>';
    }
  }

  results.addEventListener("click", ev => {
    const item = ev.target.closest(".sr-item");
    if (!item) return;
    document.querySelectorAll(".sr-item").forEach(el => el.classList.remove("active"));
    item.classList.add("active");
    const qn = item.dataset.qn;
    const name = qn.split("::").pop();
    showFlow(qn, name);
  });
}

// ───────── 流程图 ─────────
function showFlow(centerQn, centerName) {
  if (!db) return;

  // 向上追溯：谁调用了 centerQn (callers)
  let callers = [];
  try {
    const cr = db.exec(
      `SELECT DISTINCT n1.qualified_name, n1.name, n1.kind, n1.file_path
       FROM edges e JOIN nodes n1 ON e.source_qualified = n1.qualified_name
       WHERE e.target_qualified = ? AND e.kind = 'CALLS' LIMIT 50`,
      [centerQn]
    );
    if (cr.length) callers = cr[0].values;
  } catch(e) {}

  // 向下追溯：centerQn 调用了谁 (callees)
  let callees = [];
  try {
    const ce = db.exec(
      `SELECT DISTINCT n2.qualified_name, n2.name, n2.kind, n2.file_path
       FROM edges e JOIN nodes n2 ON e.target_qualified = n2.qualified_name
       WHERE e.source_qualified = ? AND e.kind = 'CALLS' LIMIT 50`,
      [centerQn]
    );
    if (ce.length) callees = ce[0].values;
  } catch(e) {}

  // 中心节点信息
  let centerKind = "Function";
  let centerFile = "";
  try {
    const ci = db.exec("SELECT kind, file_path, line_start FROM nodes WHERE qualified_name=? LIMIT 1", [centerQn]);
    if (ci.length) { centerKind = ci[0].values[0][0]; centerFile = ci[0].values[0][1] || ""; }
  } catch(e) {}

  // 构建节点和边
  const nodeMap = new Map();
  const nodes = [];
  const edges = [];
  let id = 0;

  function addNode(qn, name, kind, file, level) {
    if (nodeMap.has(qn)) return nodeMap.get(qn);
    const n = { id: id++, qn, name, kind, file, level };
    nodeMap.set(qn, n);
    nodes.push(n);
    return n;
  }

  // 中心节点 (level 0)
  const center = addNode(centerQn, centerName, centerKind, centerFile, 0);

  // callers (level -1)
  callers.forEach(([qn, name, kind, file]) => {
    const n = addNode(qn, name, kind, file, -1);
    edges.push({ source: n.id, target: center.id, kind: "CALLS" });
  });

  // callees (level +1)
  callees.forEach(([qn, name, kind, file]) => {
    const n = addNode(qn, name, kind, file, +1);
    edges.push({ source: center.id, target: n.id, kind: "CALLS" });
  });

  currentFlow = { nodes, edges, center };

  // 布局计算
  layoutFlow(nodes, edges);

  renderFlow(nodes, edges, center);
}

// ───────── 布局算法 (垂直流程图) ─────────
function layoutFlow(nodes, edges) {
  const NODE_W = 320, NODE_H = 56;
  const H_GAP = 30, V_GAP = 20;

  // 按 level 分组
  const levels = new Map();
  nodes.forEach(n => {
    if (!levels.has(n.level)) levels.set(n.level, []);
    levels.get(n.level).push(n);
  });

  // 排序 level
  const sortedLevels = [...levels.keys()].sort((a, b) => a - b);

  // 计算位置
  const levelCount = sortedLevels.length;
  const totalHeight = levelCount * (NODE_H + V_GAP) - V_GAP;
  const startY = (H - totalHeight) / 2;

  sortedLevels.forEach((lev, li) => {
    const row = levels.get(lev);
    const totalWidth = row.length * (NODE_W + H_GAP) - H_GAP;
    const startX = (W - totalWidth) / 2;

    row.forEach((n, i) => {
      n.x = startX + i * (NODE_W + H_GAP);
      n.y = startY + li * (NODE_H + V_GAP);
    });
  });
}

// ───────── 渲染 ─────────
function renderFlow(nodes, edges, center) {
  gNodes.selectAll("*").remove();
  gEdges.selectAll("*").remove();

  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  const NODE_W = 320, NODE_H = 56;

  // 边
  edges.forEach(e => {
    const src = nodeMap.get(e.source), tgt = nodeMap.get(e.target);
    if (!src || !tgt) return;

    const sx = src.x + NODE_W / 2, sy = src.y + NODE_H;
    const tx = tgt.x + NODE_W / 2, ty = tgt.y;

    let markerId = "url(#arrow-calls)";
    if (e.kind === "INHERITS") markerId = "url(#arrow-inherits)";
    if (e.kind === "IMPORTS_FROM") markerId = "url(#arrow-imports)";

    const color = e.kind === "CALLS" ? "#3fb950" : e.kind === "INHERITS" ? "#d2a8ff" : "#f0883e";

    gEdges.append("path")
      .attr("class", "edge-path")
      .attr("d", `M${sx},${sy} C${sx},${(sy + ty) / 2} ${tx},${(sy + ty) / 2} ${tx},${ty}`)
      .attr("stroke", color)
      .attr("stroke-width", e.kind === "CALLS" ? 1.5 : 2)
      .attr("stroke-dasharray", e.kind === "IMPORTS_FROM" ? "6,3" : null)
      .attr("opacity", 0.6)
      .attr("marker-end", markerId);

    // 边标签
    const mx = (sx + tx) / 2, my = (sy + ty) / 2;
    const label = EDGE_LABEL_ZH[e.kind] || e.kind;
    gEdges.append("text")
      .attr("x", mx).attr("y", my - 4)
      .attr("text-anchor", "middle")
      .attr("fill", "#8b949e").attr("font-size", "10px")
      .text(label);
  });

  // 节点
  const nodeG = gNodes.selectAll("g").data(nodes).enter().append("g");

  // 阴影
  nodeG.append("rect")
    .attr("x", d => d.x).attr("y", d => d.y)
    .attr("width", NODE_W).attr("height", NODE_H)
    .attr("rx", 8).attr("ry", 8)
    .attr("fill", "#00000033")
    .attr("transform", "translate(2,3)");

  // 主体
  nodeG.append("rect")
    .attr("class", "node-rect")
    .attr("x", d => d.x).attr("y", d => d.y)
    .attr("width", NODE_W).attr("height", NODE_H)
    .attr("rx", 8).attr("ry", 8)
    .attr("fill", d => d.id === (center ? center.id : -1) ? "#1f2835" : "#161b22")
    .attr("stroke", d => {
      if (d.id === (center ? center.id : -1)) return "#58a6ff";
      const c = KIND_COLOR[d.kind] || "#30363d";
      return c;
    })
    .attr("stroke-width", d => d.id === (center ? center.id : -1) ? 2.5 : 1.5)
    .attr("cursor", "pointer");

  // 类型标签
  nodeG.append("rect")
    .attr("x", d => d.x + 10).attr("y", d => d.y - 8)
    .attr("width", d => {
      const l = KIND_LABEL_ZH[d.kind] || d.kind;
      return l.length * 12 + 14;
    })
    .attr("height", 16).attr("rx", 4)
    .attr("fill", d => KIND_COLOR[d.kind] || "#30363d");

  nodeG.append("text")
    .attr("x", d => d.x + 17).attr("y", d => d.y + 4)
    .attr("fill", "#0d1117").attr("font-size", "10px")
    .attr("font-weight", "700")
    .text(d => KIND_LABEL_ZH[d.kind] || d.kind);

  // 中英双语名称
  nodeG.append("text")
    .attr("x", d => d.x + 14).attr("y", d => d.y + 26)
    .attr("fill", "#e6edf3").attr("font-size", "13px")
    .attr("font-weight", "600")
    .text(d => d.name);
  nodeG.append("text")
    .attr("x", d => d.x + 14).attr("y", d => d.y + 44)
    .attr("fill", "#8b949e").attr("font-size", "11px")
    .text(d => {
      const kzh = KIND_LABEL_ZH[d.kind] || d.kind;
      const file = d.file ? d.file.replace(/^.*[\\/]/, "").slice(0, 40) : "";
      return `${kzh}名：${d.name}  /  ${d.kind}: ${d.name}  ·  ${file}`;
    });

  // 悬停
  const tip = document.getElementById("tooltip");
  nodeG.on("mouseenter", function(ev, d) {
    tip.innerHTML = `
      <div style="font-weight:700;font-size:14px;color:#e6edf3">${esc(d.name)}</div>
      <div style="margin-top:4px">
        <span style="display:inline-block;background:${KIND_COLOR[d.kind]||'#555'};color:#0d1117;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:6px">${d.kind}</span>
        <span style="color:#8b949e">${KIND_LABEL_ZH[d.kind]||d.kind}</span>
      </div>
      <div style="margin-top:6px;color:#8b949e;font-size:11px">路径：${esc(d.file||'—')}</div>
      ${d.id === (center ? center.id : -1) ? '<div style="margin-top:4px;color:#58a6ff">★ 当前选中</div>' : ''}
    `;
    tip.classList.add("on");
    tip.style.left = (ev.pageX + 14) + "px";
    tip.style.top = (ev.pageY + 14) + "px";
  });
  nodeG.on("mousemove", function(ev) {
    tip.style.left = (ev.pageX + 14) + "px";
    tip.style.top = (ev.pageY + 14) + "px";
  });
  nodeG.on("mouseleave", () => tip.classList.remove("on"));

  // 点击节点 → 重新展开该节点
  nodeG.on("click", function(ev, d) {
    ev.stopPropagation();
    showFlow(d.qn, d.name);
  });

  fitGraph();
}

function fitGraph() {
  const b = gRoot.node().getBBox();
  if (b.width === 0 || b.height === 0) return;
  const pad = 0.12;
  const fw = b.width * (1 + 2 * pad), fh = b.height * (1 + 2 * pad);
  const s = Math.min(W / fw, H / fh, 1.8);
  const tx = W / 2 - (b.x + b.width / 2) * s;
  const ty = H / 2 - (b.y + b.height / 2) * s;
  svg.transition().duration(500).call(
    d3.zoom().scaleExtent([0.1, 5]).transform,
    d3.zoomIdentity.translate(tx, ty).scale(s)
  );
}

// ───────── 工具函数 ─────────
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ───────── 窗口 resize ─────────
window.addEventListener("resize", () => {
  W = document.getElementById("main").clientWidth;
  H = document.getElementById("main").clientHeight;
  svg.attr("viewBox", [0, 0, W, H]);
  if (currentFlow.nodes.length) {
    layoutFlow(currentFlow.nodes, currentFlow.edges);
    renderFlow(currentFlow.nodes, currentFlow.edges, currentFlow.center);
  }
});

// ───────── 启动 ─────────
init().catch(e => {
  document.getElementById("loading").innerHTML = 
    `<div style="color:#f85149">加载失败: ${esc(e.message)}</div>
     <div style="margin-top:8px;color:#8b949e;font-size:13px">请确保 graph.db 与此 HTML 在同一目录</div>`;
});
</script>
</body>
</html>
